<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>craftco.lab</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">
  <div class="logo">craftco.lab</div>

  <nav class="nav-links" id="navLinks">
    <a href="/">Home</a>
    <a href="#shop">Shop</a>
    <a href="cart.html">Cart</a>
    <a href="orders.html">Orders</a>
    <a href="login.html" id="loginLink">Login</a>
    <a href="#" id="logoutLink" onclick="logout()" style="display:none;">Logout</a>
  </nav>

  <div class="hamburger" onclick="toggleMenu()">☰</div>
</header>


<section class="hero">
  <div class="hero-inner">
    <h1>Modern Artistic Expression</h1>
    <p>Curated minimal paintings crafted for contemporary spaces.</p>
    <a href="#shop" class="primary-btn">Shop Collection</a>
  </div>
</section>


<section class="shop-section" id="shop">
  <div class="section-header">
    <h2>Featured Works</h2>
  </div>
  <div class="product-grid" id="paintingsContainer"></div>
</section>


<footer class="footer">
  <div class="footer-inner">
    <p>© 2026 craftco.lab — All rights reserved</p>
  </div>
</footer>


<script>

/* NAV */
function toggleMenu(){
  document.getElementById("navLinks").classList.toggle("active");
}

function logout(){
  localStorage.removeItem("token");
  location.reload();
}

function checkLogin(){
  const token = localStorage.getItem("token");
  if(token){
    document.getElementById("loginLink").style.display="none";
    document.getElementById("logoutLink").style.display="inline";
  }
}
checkLogin();

/* LOAD PRODUCTS */
async function loadPaintings(){
  const res = await fetch("/api/paintings");
  const paintings = await res.json();
  const container = document.getElementById("paintingsContainer");
  container.innerHTML="";

  paintings.forEach(p=>{
    container.innerHTML += `
      <div class="product-card">
        <div class="image-wrap">
          <img src="${p.image}" alt="${p.title}">
        </div>
        <div class="product-info">
          <h3>${p.title}</h3>
          <p class="price">₹ ${p.price}</p>
          <div class="product-actions">
            <button onclick="addToCart('${p._id}')">Add to Cart</button>
            <span onclick="likePainting('${p._id}',this)">♡</span>
          </div>
        </div>
      </div>
    `;
  });
}

async function likePainting(id,el){
  await fetch("/api/paintings/like/"+id,{method:"POST"});
  el.classList.toggle("liked");
}

async function addToCart(id){
  const token = localStorage.getItem("token");
  if(!token){
    alert("Please login first");
    return;
  }

  await fetch("/api/cart/add",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:token
    },
    body:JSON.stringify({ paintingId:id })
  });

  alert("Added to cart");
}

loadPaintings();

</script>

</body>
</html>
