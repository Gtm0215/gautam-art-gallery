<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>craftco.lab</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= MOVING TOP BAR ================= -->
<div class="top-bar">
  <div class="top-track">
    <span>Free Shipping Above ₹999</span>
    <span>|</span>
    <span>Limited Edition Art Drops</span>
    <span>|</span>
    <span>Custom Paintings Available</span>
    <span>|</span>
    <span>Free Shipping Above ₹999</span>
    <span>|</span>
    <span>Limited Edition Art Drops</span>
  </div>
</div>

<!-- ================= NAVBAR ================= -->
<header class="navbar">

  <div class="nav-left"></div>

  <div class="nav-center">
    <div class="logo">craftco.lab</div>

    <nav class="nav-links" id="navLinks">
      <a href="#">Categories</a>
      <a href="#">Store</a>
      <a href="#">Track Order</a>
      <a href="#">Contact Us</a>
    </nav>
  </div>

  <div class="icons">

  <!-- Search -->
  <svg class="icon" viewBox="0 0 24 24">
    <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <line x1="16.65" y1="16.65" x2="21" y2="21" stroke="currentColor" stroke-width="1.5"/>
  </svg>

  <!-- User -->
  <svg class="icon" viewBox="0 0 24 24">
    <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <path d="M4 20c0-4 4-6 8-6s8 2 8 6" stroke="currentColor" stroke-width="1.5" fill="none"/>
  </svg>

  <!-- Wishlist -->
  <svg class="icon" viewBox="0 0 24 24">
    <path d="M12 21s-6-4.35-9-8.5C-1 7 3 3 7 5c2 1 3 3 5 3s3-2 5-3c4-2 8 2 4 7.5C18 16.65 12 21 12 21z"
      stroke="currentColor" stroke-width="1.5" fill="none"/>
  </svg>

  <!-- Cart -->
  <svg class="icon" viewBox="0 0 24 24">
    <circle cx="9" cy="21" r="1.5" fill="currentColor"/>
    <circle cx="18" cy="21" r="1.5" fill="currentColor"/>
    <path d="M1 1h4l2 13h11l2-8H6" stroke="currentColor" stroke-width="1.5" fill="none"/>
  </svg>

</div>

</header>

<!-- ================= HERO ================= -->
<section class="hero">
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <h1>#ART COLLECTION</h1>
    <p>Handmade paintings & creative prints you'll love</p>
  </div>
</section>

<!-- ================= FEATURED PRODUCTS ================= -->
<section class="featured">
  <h2>Featured Products</h2>

  <div class="product-grid" id="productGrid">
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
