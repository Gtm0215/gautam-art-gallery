<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gautam Art Gallery</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{background:#f4f4f4;scroll-behavior:smooth;}

header{
background:white;
padding:20px 50px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:1000;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

header h1{
color:#222;
font-weight:700;
}

nav a{
margin:0 15px;
text-decoration:none;
color:#333;
font-weight:500;
}

nav a:hover{
color:#e63946;
}

.hero{
height:80vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
background:url('https://images.unsplash.com/photo-1549887534-4d45e7a6b8f9') center/cover;
}

.hero h2{
font-size:60px;
background:rgba(0,0,0,0.6);
padding:20px 40px;
border-radius:20px;
}

.section{
padding:80px 10%;
text-align:center;
}

.section h2{
font-size:40px;
margin-bottom:40px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}

.product{
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
transition:0.3s;
}

.product img{
width:100%;
height:300px;
object-fit:cover;
border-radius:15px;
}

.product:hover{
transform:translateY(-10px);
}

.btn{
background:#e63946;
color:white;
padding:10px 20px;
border:none;
border-radius:30px;
cursor:pointer;
margin-top:10px;
}

footer{
background:#111;
color:white;
padding:40px;
text-align:center;
}
</style>
</head>

<body>

<header>
<h1>Gautam Art Gallery</h1>
<nav>
<a href="#">Home</a>
<a href="#gallery">Gallery</a>
<a href="/admin.html">Admin</a>
</nav>
</header>

<div class="hero">
<h2>Original Paintings Collection</h2>
</div>

<section class="section" id="gallery">
<h2>Our Paintings</h2>

<div class="products" id="paintingsContainer">
<!-- Paintings will load here -->
</div>

</section>

<footer>
© 2026 Gautam Art Gallery | All Rights Reserved
</footer>

<script>

async function loadPaintings() {
  const res = await fetch("/api/paintings");
  const paintings = await res.json();

  const container = document.getElementById("paintingsContainer");
  container.innerHTML = "";

  paintings.forEach(painting => {
    container.innerHTML += `
      <div class="product">
        <img src="${painting.image}" />
        <h3>${painting.title}</h3>
        <p>₹ ${painting.price}</p>
        <p>${painting.description}</p>
        <button class="btn">Buy Now</button>
      </div>
    `;
  });
}

loadPaintings();

</script>

</body>
</html>
