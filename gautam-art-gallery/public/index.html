<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CraftCo Art Gallery</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

</head>

<body>
  <!-- OFFER BAR -->

<div class="offer-bar">
FREE SHIPPING ON ORDERS ABOVE ₹999
</div>


<!-- NAVBAR -->

<header class="navbar">

<div class="logo">
CraftCo
</div>

<div class="nav-icons">

<span class="icon">🔍</span>

<span class="icon">👤</span>

<span class="icon">🤍</span>

<span class="icon">🛒</span>

</div>

</header>


<!-- HERO SECTION -->

<section class="hero">

<img src="/uploads/hero.png">

<div class="hero-text">
<h1>#ART COLLECTION</h1>
<p>Handmade paintings & creative prints you'll love</p>
</div>

</section>


<!-- COLLECTION SECTION -->

<section class="collections">

<h2>Explore Our Collections</h2>

<div class="category-grid">


<div class="category-card">

<img src="/uploads/default1.jpg">

<div class="category-title">
Paintings
</div>

</div>


<div class="category-card">

<img src="/uploads/default2.jpg">

<div class="category-title">
Custom Paintings
</div>

</div>


<div class="category-card">

<img src="/uploads/default3.jpg">

<div class="category-title">
Bookmarks
</div>

</div>


<div class="category-card">

<img src="/uploads/default4.jpg">

<div class="category-title">
Postcards
</div>

</div>


</div>

</section>



<!-- FEATURED PRODUCTS -->

<section class="featured">

<h2>Featured Products</h2>

<div class="product-grid" id="featuredProducts">

</div>

</section>



<script>

async function loadFeatured(){

const res = await fetch("/api/paintings");

const data = await res.json();

const container = document.getElementById("featuredProducts");

container.innerHTML = "";

data.forEach(product => {

const card = document.createElement("div");

card.className = "product-card";

card.innerHTML = `
<img src="${product.image}">
<div class="product-info">
<div class="product-title">${product.title}</div>
<div class="price">₹${product.price}</div>
<button class="add-cart">Add to Cart</button>
</div>
`;

container.appendChild(card);

});

}

loadFeatured();

</script>


</body>
</html>
