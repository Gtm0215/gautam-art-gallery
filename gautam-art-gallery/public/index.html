<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>craftco.lab</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
  Custom Paintings Available  |  Free Shipping Above ₹999  |  Limited Edition Art Drops
</div>

<!-- HEADER -->
<header class="main-header">

  <div class="logo">craftco.lab</div>

  <nav class="nav-links">
    <a href="#">Categories</a>
    <a href="#shop">Store</a>
    <a href="orders.html">Track Order</a>
    <a href="#">Contact Us</a>
  </nav>

  <div class="nav-icons">
    <span>🔍</span>
    <span>👤</span>
    <span>♡</span>
    <span onclick="window.location='cart.html'">🛒</span>
  </div>

</header>

<!-- HERO -->
<section class="hero-section">
  <div class="hero-container">
    <img src="/uploads/hero.jpg" alt="Hero">
    <div class="hero-overlay">
      <h1>#ART COLLECTION</h1>
      <p>Handmade paintings & creative prints you'll love</p>
    </div>
  </div>
</section>

<!-- PRODUCTS -->
<section class="products-section" id="shop">
  <div class="product-grid" id="paintingsContainer"></div>
</section>

<script>

/* LOAD PRODUCTS */
async function loadPaintings(){
  const res = await fetch("/api/paintings");
  const paintings = await res.json();
  const container = document.getElementById("paintingsContainer");
  container.innerHTML="";

  paintings.forEach(p=>{
    container.innerHTML += `
      <div class="product-card">
        <img src="${p.image}">
        <h3>${p.title}</h3>
        <p>₹ ${p.price}</p>
        <button onclick="addToCart('${p._id}')">Add to Cart</button>
      </div>
    `;
  });
}

async function addToCart(id){
  const token = localStorage.getItem("token");
  if(!token){ alert("Login first"); return; }

  await fetch("/api/cart/add",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:token
    },
    body:JSON.stringify({ paintingId:id })
  });

  alert("Added to cart");
}

loadPaintings();

</script>

</body>
</html>
