<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Cart - Gautam Art</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
font-family:Poppins;
background:#f4f4f4;
margin:0;
}

header{
background:white;
padding:20px 60px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

header h1{margin:0;}

.container{
padding:60px 8%;
}

.cart-item{
background:white;
padding:20px;
border-radius:20px;
display:flex;
gap:20px;
margin-bottom:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.cart-item img{
width:150px;
height:150px;
object-fit:cover;
border-radius:15px;
}

.details{
flex:1;
}

button{
background:#e63946;
color:white;
border:none;
padding:8px 15px;
border-radius:30px;
cursor:pointer;
}

.total{
font-size:22px;
font-weight:600;
margin-top:30px;
}

.checkout{
margin-top:20px;
padding:12px 25px;
font-size:16px;
}
</style>
</head>

<body>

<header>
<h1>My Cart</h1>
<a href="/">Back to Home</a>
</header>

<div class="container">
<div id="cartContainer"></div>
<div class="total" id="totalPrice"></div>
<button class="checkout" onclick="checkout()">Proceed to Checkout</button>
</div>

<script>

async function loadCart(){
const token=localStorage.getItem("token");

if(!token){
alert("Please login first");
window.location="/login.html";
return;
}

const res=await fetch("/api/cart",{
headers:{ Authorization:token }
});

const items=await res.json();
const container=document.getElementById("cartContainer");

let total=0;
container.innerHTML="";

items.forEach((item,index)=>{
total+=item.painting.price;

container.innerHTML+=`
<div class="cart-item">
<img src="${item.painting.image}">
<div class="details">
<h3>${item.painting.title}</h3>
<p>Size: ${item.size}</p>
<p>Frame: ${item.framed}</p>
<p>Price: ₹ ${item.painting.price}</p>
<button onclick="removeItem(${index})">Remove</button>
</div>
</div>
`;
});

document.getElementById("totalPrice").innerText="Total: ₹ "+total;
}

async function removeItem(index){
alert("For now cart resets on server restart. Advanced removal will be added next.");
}

function checkout(){
alert("Payment integration coming next 🔥");
}

loadCart();

</script>

</body>
</html>
