<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="gallery.html">Gallery</a>
</nav>

<h1 style="text-align:center;">Admin Dashboard</h1>

<div style="max-width:400px;margin:auto;">

  <!-- LOGIN -->
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>

  <hr>

  <!-- ADD PAINTING -->
  <input id="title" placeholder="Title">
  <input id="description" placeholder="Description">
  <input id="price" placeholder="Price">
  <input id="stock" placeholder="Stock">
  <input type="file" id="image">
  <button onclick="addPainting()">Add Painting</button>

</div>

<script>

async function login() {
  const res = await fetch("/api/admin/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    })
  });

  const data = await res.json();

  if (data.success) {
    localStorage.setItem("token", data.token);
    alert("Login Successful!");
  } else {
    alert("Invalid credentials");
  }
}

async function addPainting() {
  const token = localStorage.getItem("token");

  if (!token) {
    alert("Please login first");
    return;
  }

  const formData = new FormData();
  formData.append("title", document.getElementById("title").value);
  formData.append("description", document.getElementById("description").value);
  formData.append("price", document.getElementById("price").value);
  formData.append("stock", document.getElementById("stock").value);
  formData.append("image", document.getElementById("image").files[0]);

  try {
    const res = await fetch("/api/paintings/add", {
      method: "POST",
      headers: {
        Authorization: token
      },
      body: formData
    });

    const data = await res.json();

    console.log(data);

    if (data.success) {
      alert("Painting Added Successfully!");
      location.reload();
    } else {
      alert(data.message || "Error adding painting");
    }

  } catch (err) {
    console.error(err);
    alert("Upload failed");
  }
}

</script>

</body>
</html>
