<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Admin Dashboard</h1>

<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<hr>

<h2>Add Painting</h2>
<input id="title" placeholder="Title">
<input id="description" placeholder="Description">
<input id="price" placeholder="Price">
<input type="file" id="image">
<button onclick="addPainting()">Add Painting</button>

<script>

async function login() {
  try {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const res = await fetch("/api/admin/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();
    console.log("Login Response:", data);

    if (data.success && data.token) {
      localStorage.setItem("token", data.token);
      alert("Login Successful!");
    } else {
      alert("Invalid Credentials");
    }

  } catch (error) {
    console.error("Login Error:", error);
    alert("Login failed");
  }
}

async function addPainting() {
  try {
    const token = localStorage.getItem("token");

    if (!token) {
      alert("Please login first");
      return;
    }

    const imageFile = document.getElementById("image").files[0];

    if (!imageFile) {
      alert("Please select an image");
      return;
    }

    const formData = new FormData();
    formData.append("title", document.getElementById("title").value);
    formData.append("description", document.getElementById("description").value);
    formData.append("price", document.getElementById("price").value);
    formData.append("image", imageFile);

    const res = await fetch("/api/paintings/add", {
      method: "POST",
      headers: {
        Authorization: token
      },
      body: formData
    });

    const data = await res.json();
    console.log("Add Painting Response:", data);

    if (data.success) {
      alert("Painting Added Successfully!");

      // clear form
      document.getElementById("title").value = "";
      document.getElementById("description").value = "";
      document.getElementById("price").value = "";
      document.getElementById("image").value = "";
    } else {
      alert("Error adding painting");
    }

  } catch (error) {
    console.error("Add Painting Error:", error);
    alert("Server Error");
  }
}

</script>

</body>
</html>
