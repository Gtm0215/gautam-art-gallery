<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel - craftco.lab</title>
  <meta charset="UTF-8" />
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      background: #f5f2f2;
    }

    h1 {
      margin-bottom: 40px;
    }

    h2 {
      margin-top: 40px;
    }

    form {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      margin-bottom: 30px;
    }

    input, select {
      display: block;
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
    }

    button {
      padding: 10px 20px;
      background: #d35d5d;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 6px;
    }

    button:hover {
      opacity: 0.9;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.06);
    }

    .card img {
      width: 120px;
      border-radius: 10px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

<h1>Admin Panel - craftco.lab</h1>

<!-- ================= CATEGORY SECTION ================= -->

<h2>Add Category</h2>

<form id="categoryForm" enctype="multipart/form-data">
  <input type="text" name="name" placeholder="Category Name" required>
  <input type="number" name="position" placeholder="Position (1-4)" required>
  <input type="file" name="image" required>
  <button type="submit">Add Category</button>
</form>

<h2>All Categories</h2>
<div id="categoryList"></div>


<!-- ================= PAINTING SECTION ================= -->

<h2>Add Painting</h2>

<form id="paintingForm" enctype="multipart/form-data">
  <input type="text" name="title" placeholder="Title" required>
  <input type="text" name="description" placeholder="Description" required>
  <input type="number" name="price" placeholder="Price" required>
  <input type="number" name="stock" placeholder="Stock" required>
  <input type="file" name="image" required>
  <button type="submit">Add Painting</button>
</form>

<h2>All Paintings</h2>
<div id="paintingList"></div>


<script>
/* ================= CATEGORY FUNCTIONS ================= */

async function loadCategories() {
  const res = await fetch("/api/categories");
  const data = await res.json();

  const list = document.getElementById("categoryList");
  list.innerHTML = "";

  data.forEach(cat => {
    list.innerHTML += `
      <div class="card">
        <img src="${cat.image}">
        <p><strong>${cat.name}</strong></p>
        <p>Position: ${cat.position}</p>
        <button onclick="deleteCategory('${cat._id}')">Delete</button>
      </div>
    `;
  });
}

document.getElementById("categoryForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const formData = new FormData(e.target);

  await fetch("/api/categories", {
    method: "POST",
    body: formData
  });

  e.target.reset();
  loadCategories();
});

async function deleteCategory(id) {
  await fetch("/api/categories/" + id, {
    method: "DELETE"
  });

  loadCategories();
}


/* ================= PAINTING FUNCTIONS ================= */

async function loadPaintings() {
  const res = await fetch("/api/paintings");
  const data = await res.json();

  const list = document.getElementById("paintingList");
  list.innerHTML = "";

  data.forEach(p => {
    list.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <p><strong>${p.title}</strong></p>
        <p>₹${p.price}</p>
      </div>
    `;
  });
}

document.getElementById("paintingForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const formData = new FormData(e.target);

  await fetch("/api/paintings", {
    method: "POST",
    body: formData
  });

  e.target.reset();
  loadPaintings();
});


/* ================= INIT LOAD ================= */

loadCategories();
loadPaintings();
</script>

</body>
</html>
